<body>
  <div id="desktop-mode-warning" class="hidden-overlay" style="display: none; position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.9); z-index: 9999; justify-content: center; align-items: center; padding: 20px;">
    <div class="warning-content" style="background-color: white; color: black; padding: 30px; border-radius: 16px; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 64px; height: 64px; margin: 0 auto 16px; color: #4f46e5;">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <h2 style="font-size: 24px; font-weight: bold; margin-bottom: 16px; font-family: 'Inter', sans-serif;">App Experience Paused</h2>
      <p style="margin-bottom: 24px; color: #4b5563; font-family: 'Inter', sans-serif;">It looks like you have "Desktop site" enabled in your browser settings. To enjoy MINDFLOW as a native app, please follow these steps:</p>
      <ol style="text-align: left; margin-bottom: 24px; color: #374151; padding: 16px; background-color: #f3f4f6; border-radius: 8px; font-family: 'Inter', sans-serif; line-height: 1.5; list-style-position: inside;">
        <li>Open your regular Chrome browser app.</li>
        <li>Tap the three-dot menu in the top right.</li>
        <li>Uncheck <strong>Desktop site</strong>.</li>
        <li>Restart this app.</li>
      </ol>
      <button onclick="window.location.reload()" style="width: 100%; background-color: #4f46e5; color: white; font-weight: bold; padding: 12px 16px; border-radius: 12px; border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 16px;">Reload App</button>
    </div>
  </div>

  <script>
    (function() {
      function checkDesktopMode() {
        var isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone || document.referrer.includes("android-app://");
        var isMobileWidthForce = window.innerWidth > window.screen.width;
        var hasTouch = navigator.maxTouchPoints > 0;

        var warningEl = document.getElementById("desktop-mode-warning");
        var rootEl = document.getElementById("root");

        // The user specifically requested this to apply only to the installed PWA
        if (isStandalone && isMobileWidthForce && hasTouch) {
          if (warningEl) warningEl.style.display = "flex";
          if (rootEl) rootEl.style.display = "none";
        } else {
          if (warningEl) warningEl.style.display = "none";
          if (rootEl) rootEl.style.display = "block";
        }
      }

      window.addEventListener("DOMContentLoaded", checkDesktopMode);
      window.addEventListener("resize", checkDesktopMode);

      // Run immediately in case DOM is already ready or script executes after DOMContentLoaded
      checkDesktopMode();
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
